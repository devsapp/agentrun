edition: 3.0.0
name: agentrun-app
access: 'quanxi'

resources:
  agentRuntime_example:
    # component: agentrun@dev
    component: ${path('../')}
    props:
      region: cn-hangzhou
      agent:
        name: test
        description: "Code-based Agent Runtime"
        
        code:
          src: ./code
          language: python3.12
          command:
            - python3
            - main.py
        
        cpu: 1.0
        memory: 2048
        port: 9000
        instanceConcurrency: 10
        internetAccess: true
        
        environmentVariables:
          ENV: production
        
        logConfig: auto
        
        workspace: 
          name: test
          # id: xxxxx
          # description: test
          # resourceGroupId: 
        
        endpoints:
          - name: production
            version: LATEST
            description: "Production endpoint"